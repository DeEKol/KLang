name: iOS CI (RN 0.81)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      NODE_VERSION: "22"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install JS dependencies
        run: npm ci

      - name: Write Firebase config
        run: echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" | base64 --decode > ios/GoogleService-Info.plist

      - name: Setup Ruby (for CocoaPods)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"

      - name: Cache CocoaPods & Pods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/.cocoapods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods
        run: |
          set -e
          gem install cocoapods -v 1.16.0 || gem install cocoapods
          gem install xcpretty -v 0.3.0
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS for simulator
        shell: bash
        run: |
          set -euo pipefail

          DERIVED_DATA="${HOME}/Library/Developer/Xcode/DerivedData/${GITHUB_RUN_ID}"
          mkdir -p "${DERIVED_DATA}"

          xcodebuild \
            -workspace ios/KLang.xcworkspace \
            -scheme KLang \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath "${DERIVED_DATA}" \
            ONLY_ACTIVE_ARCH=NO \
            clean build \
            2>&1 | xcpretty
          exit ${PIPESTATUS[0]}

